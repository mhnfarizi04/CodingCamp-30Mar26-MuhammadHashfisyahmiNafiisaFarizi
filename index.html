<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CodingCamp-300326-MuhammadHashfisyahmiNafiisaFarizi</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body class="bg-light transition-all">

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <h3 class="text-center fw-bold mb-4 header-title"><i class="fas fa-receipt"></i>&nbsp; Expense & Budget Visualizer</h3>

                <div class="card shadow-sm border-0 mb-4 p-4 text-center balance-card">
                    <span class="text-muted small fw-bold text-uppercase"><i class="fas fa-wallet"></i>&nbsp; Total Balance</span>
                    <h1 id="totalBalance" class="display-4 fw-bold mt-2">$ 0.00</h1>
                </div>

                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4"><i class="fas fa-plus"></i>&nbsp; Add Transaction</h5>
                        <form id="transactionForm">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Item Name</label>
                                <input type="text" id="item" class="form-control bg-light" placeholder="e.g. Salary, Cilok" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Amount</label>
                                <input type="number" id="amount" class="form-control bg-light" placeholder="0.00" step="0.01" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Type</label>
                                    <select id="type" class="form-select bg-light">
                                        <option value="expense">Expense (Pengeluaran)</option>
                                        <option value="income">Income (Pemasukan)</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Category</label>
                                    <select id="category" class="form-select bg-light">
                                        <option value="Food">Food</option>
                                        <option value="Transport">Transport</option>
                                        <option value="Fun">Fun</option>
                                        <option value="Work">Work/Salary</option>
                                        <option value="Custom">+ Custom</option>
                                    </select>
                                </div>
                            </div>
                            <div id="customCatWrapper" class="mb-3 d-none">
                                <input type="text" id="customCategory" class="form-control bg-light border-primary" placeholder="Enter custom category">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm"><i class="fas fa-plus"></i>&nbsp; Add Transaction</button>
                        </form>
                    </div>
                </div>

                <div id="monitoringSection" class="row g-4 d-none">
                    <div class="col-md-6">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-header bg-transparent border-0 pt-4 px-4">
                                <h5 class="fw-bold">Transactions</h5>
                            </div>
                            <div class="card-body px-4 pb-4">
                                <div id="transactionList" class="transaction-scroll">
                                    </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-header bg-transparent border-0 pt-4 px-4">
                                <h5 class="fw-bold">Spending by Category</h5>
                            </div>
                            <div class="card-body p-4 d-flex align-items-center justify-content-center">
                                <canvas id="expenseChart" style="max-height: 250px;"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="darkModeBtn" class="heartbeat-btn shadow-lg">
        <i class="fas fa-moon"></i>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
